services:
  - type: web
    name: ors-web
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm run start:backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_COOKIE_NAME
        value: ors.sid
      - key: SESSION_TTL_HOURS
        value: "8"
      - key: MONGODB_URI
        sync: false
      - key: APP_TIMEZONE
        value: Asia/Kolkata
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SECURE
        value: "true"
      - key: MAIL_FROM
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: FAST2SMS_API_KEY
        sync: false
      - key: FAST2SMS_ROUTE
        value: q
      - key: FAST2SMS_LANGUAGE
        value: english
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Main Admin
